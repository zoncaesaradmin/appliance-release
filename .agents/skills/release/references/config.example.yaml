# Example config for the appliance-release skill.
# Fill in the SSH user/host or SSH alias details for your environment.
# Use absolute remote paths.

build_host:
  # Example:
  # alias: zonsys@192.168.1.102
  # alias: build-host-alias-from-ssh-config
  alias: zonsys@192.168.1.102

target_host:
  # Example:
  # alias: target-user@192.168.1.101
  # alias: target-host-alias-from-ssh-config
  alias: zonsys@192.168.1.101
  state_dir: /var/lib/zon

release_workspace:
  # Remote appliance-release checkout on the build machine. If this path does not
  # exist yet, build-and-publish.sh clones it before bootstrap/build.
  remote_repo_path: /home/zonsys/ws/appliance-release
  # Optional when running the skill from a local appliance-release git checkout:
  # defaults to that checkout's origin remote. Set explicitly for automation
  # outside a git checkout or when you need a different upstream URL.
  remote_repo_source: https://github.com/zoncaesaradmin/appliance-release.git
  remote_repo_ref: main
  # The build-host checkout at remote_repo_path is skill-managed: missing paths
  # are cloned, existing checkouts are fetched and hard-reset to remote_repo_ref,
  # and local dirty files are discarded. Do not hand-edit files on the build host.
  # Export directory produced on the build machine.
  # The skill injects this as EXPORT_DIR for both build and publish so the
  # publish step does not accidentally use a stale export from an older run.
  remote_export_dir: /home/zonsys/appliance-build/export
  # Optional fallback only. The skill now prefers the real paths printed by the
  # build log, so these are mainly used if log parsing fails.
  remote_release_input_path: /tmp/appliance-product-ci/artifacts/release-input-0.1.0.tar.gz
  # Optional fallback only. The skill now prefers the real paths printed by the
  # build log, so this is mainly used if log parsing fails.
  remote_bundle_dir: /tmp/appliance-product-ci/workspace/out/appliance-0.1.0-bundle

artifact_registry:
  # RELEASE DISTRIBUTION ONLY: public HTTP/HTTPS base URL serving signed
  # installer/bundle files. This is not the in-appliance zot OCI registry;
  # appliance clients use client_verification.base_url plus /v2/.
  # Example: http://192.168.1.103:28081
  base_url: http://artifact-host-or-ip:28081
  # SSH target used by the build machine's publish command when needed.
  # Example:
  # publish_server_alias: publish-user@192.168.1.103
  # publish_server_alias: publish-host-alias-from-ssh-config
  publish_server_alias: zonsys@192.168.1.103
  publish_remote_root: /home/zonsys/releases
  release_path_prefix: appliance

release:
  version: 0.1.0
  publish_latest_alias: false

build_flow:
  # Required for bootstrap-build-host.sh when the build host still needs the
  # one-time appliance-code registry login/bootstrap.
  # Put the username here and keep the token in the existing Mac env var:
  # export REGISTRY_TOKEN='...'
  registry_user: your-registry-username
  registry_token_env: REGISTRY_TOKEN
  # Optional but less secure alternative if you really want the token in config:
  # registry_token: your-registry-token
  git_pull_command: git pull
  # NOTE: build-and-publish.sh no longer runs git_pull_command against the
  # build-host checkout. It clones or hard-resets release_workspace.remote_repo_path
  # to remote_repo_ref so dirty local files cannot block the flow. Keep this key
  # only for older docs/tooling compatibility.
  bootstrap_command: bash /home/zonsys/ws/appliance-release/scripts/ci/bootstrap-build-host.sh
  bootstrap_needs_sudo: true
  build_needs_sudo: true
  # PRODUCT_VERSION and EXPORT_DIR are injected automatically by the skill from
  # release.version and release_workspace.remote_export_dir.
  build_command: K3S_BINARY_SOURCE=/home/zonsys/ci/inputs/k3s K3S_AIRGAP_IMAGES_SOURCE=/home/zonsys/ci/inputs/k3s-airgap-images-amd64.tar.zst bash /home/zonsys/ws/appliance-release/scripts/ci/build-full-bundle.sh
  # PRODUCT_VERSION, EXPORT_DIR, and PUBLISH_PUBLIC_BASE_URL are injected
  # automatically by the skill, so keep the command itself minimal.
  publish_command: make publish-release PUBLISH_SERVER=zonsys@192.168.1.103 PUBLISH_REMOTE_ROOT=/home/zonsys/releases
  # Argo Workflows is a mandatory component of the complete v1 appliance
  # (ADR 0011) and build-full-bundle.sh enables it by default with zero
  # configuration: its version and controller/executor image references
  # are derived automatically from appliance-code's own
  # deploy/charts/argo-workflows/Chart.yaml, and its CRDs are fetched
  # automatically from the matching upstream GitHub release. Nothing
  # below is required for an ordinary build — uncomment only to override
  # a specific default (e.g. an offline/pinned CRD source, or a mirrored
  # image reference).
  argo:
    # enabled: false                  # opt out entirely (control-plane-only debug build)
    # crds_dir_source: /home/zonsys/ci/inputs/argo-crds   # use a local CRD copy instead of fetching from GitHub
    # version: v3.5.10                                    # pin a different Argo version than the chart's appVersion
    # controller_image_ref: quay.io/argoproj/workflow-controller:v3.5.10
    # executor_image_ref: quay.io/argoproj/argoexec:v3.5.10
    # Optional local archive overrides if you already mirrored the OCI images.
    # controller_image_archive_source: /home/zonsys/ci/inputs/argo/workflow-controller.oci.tar
    # executor_image_archive_source: /home/zonsys/ci/inputs/argo/argoexec.oci.tar
  # Workspace provisioning uses an appliance-owned generic image with git and
  # CA certificates. Online build hosts can omit both fields: build-full-bundle.sh
  # then pulls docker.io/alpine/git:latest for linux/amd64, reads the archived
  # platform manifest digest from index.json, and labels the archive as
  # registry.local/workspace-provisioner@sha256:<that-digest>. Do not pin digests
  # from `skopeo inspect` alone — multi-arch index digests will not match the archive.
  # For a pinned/offline tryout, export once then set the archive source (digest is
  # derived from the archive; the ref name is optional):
  #   skopeo copy --override-os linux --override-arch amd64 \
  #     docker://docker.io/alpine/git:latest \
  #     oci-archive:/home/zonsys/ci/inputs/workspace-provisioner.oci.tar:registry.local/workspace-provisioner
  # workspace_provisioner_image_archive_source: /home/zonsys/ci/inputs/workspace-provisioner.oci.tar
  # workspace_provisioner_image_ref: registry.local/workspace-provisioner
  # Zot is a required first-class image/chart contract in every complete bundle.
  # It is activated at install time only for storage and builder profiles.
  # Online builds pull this exact version on the build host, copy linux/amd64,
  # and derive registry.local/zot@sha256:<index.json platform digest>. The
  # archive is relabeled registry.local/zot:bundled for reliable ctr import.
  zot:
    version: 2.1.8
    image_pull_ref: ghcr.io/project-zot/zot-linux-amd64:v2.1.8
    # Offline/premirrored alternative; version and digest are still validated:
    # image_archive_source: /home/zonsys/ci/inputs/zot.oci.tar
  # Builder-profile builds require the bundled automation-dev (CI/dev-container)
  # image. zonctl picks the automation-dev@sha256 ref from the bundle and injects
  # config.builderImageDigest. Catalogs must not set per-target builder digests.
  # Online build hosts can pull from GHCR during the bundle build (requires skopeo
  # and the same REGISTRY_USER / REGISTRY_TOKEN bootstrap used for appliance-code).
  # Digests in extra_oci_image_refs are advisory; the build overwrites them with the
  # archived platform manifest digest:
  extra_oci_image_pull_refs: ghcr.io/zoncaesaradmin/development-container/automation-dev:v0.1.0
  extra_oci_image_refs: registry.local/automation-dev
  # Offline/pinned alternative: export once, then use archive sources instead of pull refs.
  # The build derives registry.local/automation-dev@sha256:<platform-digest> from the archive:
  #   skopeo copy --override-os linux --override-arch amd64 \
  #     docker://ghcr.io/zoncaesaradmin/development-container/automation-dev:v0.1.0 \
  #     oci-archive:/home/zonsys/ci/inputs/automation-dev.oci.tar:registry.local/automation-dev
  # extra_oci_image_archive_sources: /home/zonsys/ci/inputs/automation-dev.oci.tar
  # extra_oci_image_refs: registry.local/automation-dev

install:
  bootstrap_admin_username: admin
  # Optional rollout/bootstrap overrides if chart naming changes again.
  # rollout_namespace: appliance-system
  # control_plane_deployment: control-plane
  # Product-facing appliance profile passed into the control plane.
  # Valid v1 values: core, builder, storage
  appliance_profile: storage
  # Local build catalog JSON/YAML. Copied to the target install temp dir and
  # passed to zonctl as product config. Required for a useful builder tryout.
  # Do not put private keys, tokens, or passwords in this file.
  # Builder workflow repo URLs must use HTTPS.
  # Start from references/build-catalog.example.yaml (no builderImageDigest keys).
  build_catalog_path: /Users/zoncaesar/build-catalog.yaml
  uninstall_first: true

verification:
  status_command: sudo zonctl status --output json
  verify_command: sudo zonctl verify --output json
  service_health_command: sudo kubectl get pods -A
  app_version_command: sudo cat /var/lib/zon/installed-state.json
  # Only enable a smoke test here if the target host can actually reach the
  # appliance HTTPS endpoint you want to prove. If you copy the localhost
  # example below unchanged, verify-target.sh will automatically rewrite it to
  # client_verification.base_url when that value is set. Otherwise replace it
  # with a host-specific reachable URL.
  smoke_test_command: 'code="$(curl -ksS -o /dev/null -w ''%{http_code}'' https://127.0.0.1/api/v1/auth/session)" && [ "$code" = "401" ]'
  failure_log_command: sudo zonctl support-bundle --output json
  # Argo verification now follows the installed profile capability by default:
  # core/builder profiles verify workflows, storage skips those checks even if
  # this block is left enabled from an older config. Keep this true only when
  # you want Argo checks for a workflow-capable profile.
  argo:
    enabled: true
    namespaces_command: sudo kubectl get namespace workflows appliance-builds
    crds_command: sudo kubectl get crd workflows.argoproj.io workflowtemplates.argoproj.io cronworkflows.argoproj.io
    controller_command: sudo kubectl -n workflows wait --for=condition=Available deployment --all --timeout=120s && sudo kubectl -n workflows get deploy,pods
  # Builder checks default to enabled when install.appliance_profile is builder.
  # The target-side check proves the build API route is registered by asserting
  # /api/v1/work-profiles does not return 404. Authenticated REST/MCP tool
  # availability is checked from the client verifier below.
  builder:
    # enabled: true
    # api_command: 'code="$(curl -ksS -o /dev/null -w ''%{http_code}'' https://target-ip-or-dns/api/v1/work-profiles)" && [ "$code" != "404" ]'
    # Builder workflow repo URLs must use HTTPS. Override only when you need a
    # custom builder-specific readiness rule.
  allow_ingress_warning: true
  allow_verify_schema_bug: true
  # Defaults enabled for storage/builder and disabled for core. The default
  # readiness command waits for the zot Deployment and confirms its PVC.
  artifact:
    # enabled: true
    # readiness_command: sudo kubectl -n registry wait --for=condition=Available deployment/appliance-registry --timeout=120s && sudo kubectl -n registry get pvc appliance-registry-data

client_verification:
  # Example: https://192.168.1.101
  base_url: https://target-ip-or-dns
  username: admin
  # Builder checks default to enabled when install.appliance_profile is builder.
  # They log in, GET /api/v1/work-profiles, initialize MCP, and assert
  # tools/list includes the full initial builder tool surface:
  # list_work_profiles, get_workspace, set_workspace, list_build_targets,
  # submit_build, list_jobs, get_job_status, get_job_steps, get_job_logs,
  # and cancel_job.
  builder:
    # enabled: true
    # For non-builder profiles this defaults to true and requires
    # /api/v1/work-profiles to return 404 and MCP tools/list to omit builder
    # workflow tools, proving build routes/tools are not registered when the
    # build capability is disabled.
    # expect_disabled: true
    # Optional real builder workflow smoke. This submits an actual build through
    # REST, polls the job, fetches steps/logs, and expects success by default.
    # Enable only when the builder catalog, Git host reachability,
    # builder image, and registry are all ready for a real build.
    workflow:
      # enabled: true
      # workspace_name: release-smoke
      # Workspace profile name for the temporary test workspace. The
      # wire-format key stays work_profile for ForgeLine compatibility.
      # work_profile: builder
      # repo: app
      # v1 workflow smoke requires an immutable lowercase 40-character commit SHA.
      # Mutable refs can be accepted later only after commit resolution is added.
      # source_ref: 0123456789abcdef0123456789abcdef01234567
      # target_name: app
      # image_tag: release-smoke
      # poll_attempts: 60
      # poll_delay_seconds: 5
      # expect_success: true
      # delete_workspace_on_success: false
  # Defaults enabled for storage/builder and disabled for core. Built-in checks
  # cover capability routing, /v2 bearer challenge, API-token issuance,
  # filtered catalog access, anonymous/denied/malformed-token rejection, and
  # token revocation. Optional smoke commands receive only process-local
  # APPLIANCE_REGISTRY_URL, APPLIANCE_REGISTRY_USERNAME, and
  # APPLIANCE_REGISTRY_TOKEN environment variables; never echo them.
  artifact:
    # enabled: true
    # Defaults to false for username=admin because administrators legitimately
    # receive broad registry pull/push grants. Set this to true only when the
    # configured verification user should be denied a probe repository scope.
    # expect_denied_scope: false
    # oci_smoke_command: /abs/path/to/oci-push-pull-smoke.sh
    # oras_smoke_command: /abs/path/to/oras-referrer-smoke.sh
    # offline_smoke_command: /abs/path/to/assert-no-public-egress-smoke.sh
