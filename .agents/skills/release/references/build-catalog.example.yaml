# Example builder-profile build catalog in the current appliance-native schema.
#
# This example is intentionally modeled from the multi-repo Forgeline-style
# catalog at /Users/zoncaesar/build-catalog.yaml, but translated into the
# appliance builder product-config format expected by appliance-code and zonctl.
#
# Important differences from the older Forgeline schema:
# - `workProfiles` replaces top-level `profiles`
# - each workspace profile explicitly lists its repos
# - each repo has one canonical `url` plus optional `defaultRef`
# - build targets are authored under `repos[].buildTargets` (preferred).
#   zonctl and the control plane flatten them to a top-level list at load time.
#   Top-level `buildTargets` with an explicit `repo` field remain accepted.
# - A target whose `name` equals the parent repo name is the whole-repo entry
#   and maps to one explicit execution + args list. There is no ForgeLine
#   expand-all / build_components semantics.
# - execution is `make` or `script`; mode-specific input is `args` (v1: one entry).
#   Legacy `make_target`/`repo_script` + `makeTarget`/`scriptPath` are still
#   accepted and normalized at load time.
# - repo URLs must use HTTPS
# - `defaultRef` is only for workspace prepare/sync (branch names are fine).
#   Current-workspace builds do not clone and do not use defaultRef; they build
#   whatever is already on disk under
#   /data/zon/workspaces/<workspace-name>/<repo-name>/
#
# Builder image:
# Optional per-target builderImageDigest. Prefer the short bundle name
# (default when omitted):
#   builderImageDigest: automation-dev
# Install resolves that to the digest-pinned automation-dev image packaged in
# the signed bundle. Advanced overrides may use a digest-pinned reference that
# is present in the bundle. Do not paste GHCR tags.
#
# Before using this file in a real install:
# - replace repo URLs and defaultRef values with real product values
# - replace imageRepository prefixes with the operator's artifact layout
#
# Do not put private keys, tokens, or passwords in this file.
workProfiles:
  - name: platform-dev
    description: Platform development multi-repo workspace profile.
    repos:
      - name: platformkit
        enabledByDefault: true
      - name: zonbundle
        enabledByDefault: true
      - name: zoncore
      - name: forgeline
        enabledByDefault: true
      - name: forgeline-release
        enabledByDefault: true

  - name: telemetry-dev
    description: Telemetry development workspace profile.
    repos:
      - name: platformkit
        enabledByDefault: true

  - name: simulation-dev
    description: Simulation development workspace profile.
    repos:
      - name: platformkit
        enabledByDefault: true
      - name: forgeline
        enabledByDefault: true

repos:
  - name: platformkit
    url: https://github.com/zoncaesaradmin/platformkit.git
    defaultRef: main
    buildTargets:
      # Repo-named target: explicit make recipe for the whole repo.
      - name: platformkit
        description: Build the platformkit Makefile default image set.
        execution: make
        args: [build]
        imageRepository: users/example/platformkit
        builderImageDigest: automation-dev
      # Second target on the same repo: different explicit make args.
      - name: platformkit-api
        description: Build only the platformkit API image.
        execution: make
        args: [api]
        imageRepository: users/example/platformkit-api
        builderImageDigest: automation-dev

  - name: zonbundle
    url: https://github.com/zoncaesaradmin/zonbundle.git
    defaultRef: main
    buildTargets:
      - name: zonbundle
        aliases: [bundle]
        description: Build the zonbundle artifact via make.
        execution: make
        args: [build]
        imageRepository: users/example/zonbundle
        builderImageDigest: automation-dev

  - name: zoncore
    url: https://github.com/zoncaesaradmin/zoncore.git
    defaultRef: main

  - name: forgeline
    url: https://github.com/zoncaesaradmin/forgeline.git
    defaultRef: main
    buildTargets:
      - name: forgeline
        description: Run the forgeline repo build script.
        execution: script
        args: [build.sh]
        imageRepository: users/example/forgeline
        builderImageDigest: automation-dev

  - name: forgeline-release
    url: https://github.com/zoncaesaradmin/forgeline-release.git
    defaultRef: main
