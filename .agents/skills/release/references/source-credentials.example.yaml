# Example target-local source credential provisioning manifest.
#
# This file contains Kubernetes Secret names and target-host file paths only.
# It must never contain private key text, tokens, or passwords. Before running
# install/upgrade with this manifest, create the referenced files on the target
# host and keep them readable only by the operator/root as appropriate.
credentials:
  - namespace: appliance-builds
    secretName: git-main-deploy-key
    privateKeyPath: /home/zonsys/.ssh/appliance-build-git
    knownHostsSecretName: git-main-known-hosts
    knownHostsPath: /home/zonsys/.ssh/known_hosts
